# docker-compose.yml — docpilot 교육 스타터 (frontend · api · db 3계층)
# 실행: docker compose up --build   →   http://localhost:8080
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: docpilot
      POSTGRES_PASSWORD: docpilot
      POSTGRES_DB: docpilot
    ports:
      - "5432:5432"                       # 로컬 DB 툴로 접속하고 싶을 때만
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # 최초 기동 시 1회 실행
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpilot -d docpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      # host 는 compose 네트워크의 서비스명 `db`
      DATABASE_URL: postgresql+psycopg://docpilot:docpilot@db:5432/docpilot
    ports:
      - "8000:8000"                       # API 직접 확인용 (http://localhost:8000/docs)
    depends_on:
      db:
        condition: service_healthy         # DB 준비 후 기동 → 초기 CrashLoop 방지

  frontend:
    build: ./frontend
    ports:
      - "8080:80"                          # 브라우저 진입점
    depends_on:
      - api

volumes:
  db-data:
