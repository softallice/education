server {
    listen 80;
    server_name _;

    # 정적 SPA
    root /usr/share/nginx/html;
    index index.html;

    # /api/ 요청은 api 서비스(FastAPI)로 프록시.
    # 끝의 슬래시가 /api/ 접두사를 제거한다: /api/health -> api:8000/health
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 라우팅: 없는 경로는 index.html 로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
